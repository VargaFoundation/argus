# TDVT override: point at Tableau Desktop's tabquerytool. Copy this into your
# TDVT workspace at config/tdvt/tdvt_override.ini and fix the version/path.
#
# The path is `<Tableau install>\bin\tabquerytool.exe`. Find your version under
# C:\Program Files\Tableau\ (e.g. "Tableau 2024.2").

[DEFAULT]
TAB_CLI_EXE_X64 = C:\Program Files\Tableau\Tableau 2024.2\bin\tabquerytool.exe

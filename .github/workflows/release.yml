name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            unixodbc-dev \
            libglib2.0-dev \
            libthrift-c-glib-dev \
            thrift-compiler \
            libcmocka-dev \
            libcurl4-openssl-dev \
            libjson-glib-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Package tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging/argus-odbc/lib
          mkdir -p staging/argus-odbc/include/argus
          cp build/src/libargus_odbc.so staging/argus-odbc/lib/
          cp include/argus/*.h staging/argus-odbc/include/argus/
          cp scripts/install_dsn.sh staging/argus-odbc/
          chmod +x staging/argus-odbc/install_dsn.sh
          cp LICENSE staging/argus-odbc/
          cp README.md staging/argus-odbc/
          tar -czf argus-odbc-${VERSION}-linux-x64.tar.gz -C staging argus-odbc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: argus-odbc-*-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            unixodbc \
            glib \
            json-glib \
            curl \
            cmocka

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Package tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="$(uname -m)"
          mkdir -p staging/argus-odbc/lib
          mkdir -p staging/argus-odbc/include/argus
          cp build/src/libargus_odbc.dylib staging/argus-odbc/lib/
          cp include/argus/*.h staging/argus-odbc/include/argus/
          cp scripts/install_dsn_macos.sh staging/argus-odbc/
          chmod +x staging/argus-odbc/install_dsn_macos.sh
          cp LICENSE staging/argus-odbc/
          cp README.md staging/argus-odbc/
          tar -czf argus-odbc-${VERSION}-macos-${ARCH}.tar.gz -C staging argus-odbc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: argus-odbc-*-macos-*.tar.gz

  build-windows:
    runs-on: windows-latest
    environment: main

    env:
      SIGN_ENABLED: ${{ secrets.AZURE_SIGNING_ACCOUNT }}

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-json-glib
            mingw-w64-ucrt-x86_64-cmocka
            mingw-w64-ucrt-x86_64-nsis

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Prepare installer files
        run: |
          mkdir -p installer/staging
          cp build/src/libargus_odbc.dll installer/staging/argus_odbc.dll
          for dll in libcurl-4.dll libglib-2.0-0.dll libgobject-2.0-0.dll \
                     libjson-glib-1.0-0.dll libgio-2.0-0.dll libgmodule-2.0-0.dll \
                     libintl-8.dll libiconv-2.dll libffi-8.dll libz1.dll \
                     libzstd.dll libbrotlidec.dll libbrotlicommon.dll \
                     libnghttp2-14.dll libssh2-1.dll libssl-3-x64.dll \
                     libcrypto-3-x64.dll libnghttp3-9.dll libidn2-0.dll \
                     libpsl-5.dll libunistring-5.dll libpcre2-8-0.dll; do
            src="$MINGW_PREFIX/bin/$dll"
            if [ -f "$src" ]; then
              cp "$src" installer/staging/
            fi
          done

      - name: Sign driver DLL
        if: env.SIGN_ENABLED != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: installer/staging
          files-folder-filter: dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build NSIS installer
        run: |
          cd installer/staging
          makensis -NOCD -DVERSION=${GITHUB_REF_NAME#v} ../argus-odbc.nsi

      - name: Sign installer
        if: env.SIGN_ENABLED != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: installer/staging
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Rename installer with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp installer/staging/argus-odbc-installer.exe argus-odbc-${VERSION}-windows-x64-installer.exe

      - name: Package Intune .intunewin
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v',''
          # Copy Intune scripts into staging
          Copy-Item installer/intune/*.ps1 installer/staging/
          # Download IntuneWinAppUtil
          $intuneToolUrl = "https://github.com/microsoft/Microsoft-Win32-Content-Prep-Tool/raw/master/IntuneWinAppUtil.exe"
          Invoke-WebRequest -Uri $intuneToolUrl -OutFile IntuneWinAppUtil.exe
          # Generate .intunewin package
          .\IntuneWinAppUtil.exe -c installer\staging -s argus-odbc-installer.exe -o . -q
          # Rename with version
          Move-Item argus-odbc-installer.intunewin "argus-odbc-${VERSION}-windows-x64.intunewin"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            argus-odbc-*-windows-x64-installer.exe
            argus-odbc-*-windows-x64.intunewin

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/argus-odbc-*

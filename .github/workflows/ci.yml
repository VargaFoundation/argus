name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            unixodbc-dev \
            libglib2.0-dev \
            libthrift-c-glib-dev \
            thrift-compiler \
            libcmocka-dev \
            libcurl4-openssl-dev \
            libjson-glib-dev \
            libmariadb-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Coverage report
        run: |
          sudo apt-get install -y lcov
          lcov --capture --directory build --output-file coverage.info --no-external
          lcov --remove coverage.info '*/tests/*' --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false

      - name: Check shared library exports
        run: |
          nm -D build/src/libargus_odbc.so | grep ' T SQL' | head -20
          echo "---"
          echo "Total exported SQL functions:"
          nm -D build/src/libargus_odbc.so | grep -c ' T SQL'

      - name: Package tar.gz
        run: |
          mkdir -p staging/argus-odbc/lib
          mkdir -p staging/argus-odbc/include/argus
          cp build/src/libargus_odbc.so staging/argus-odbc/lib/
          cp include/argus/*.h staging/argus-odbc/include/argus/
          cp scripts/install_dsn.sh staging/argus-odbc/
          chmod +x staging/argus-odbc/install_dsn.sh
          tar -czf argus-odbc-linux-x64.tar.gz -C staging argus-odbc

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-linux
          path: argus-odbc-linux-x64.tar.gz

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Package .deb
        run: bash packaging/build-deb.sh

      - name: Package .rpm
        run: bash packaging/build-rpm.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-deb
          path: argus-odbc_*.deb

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-rpm
          path: argus-odbc-*.rpm

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install \
            cmake \
            pkg-config \
            unixodbc \
            glib \
            json-glib \
            curl \
            cmocka

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Check shared library exports
        run: |
          nm -gU build/src/libargus_odbc.dylib | grep ' _SQL' | head -20
          echo "---"
          echo "Total exported SQL functions:"
          nm -gU build/src/libargus_odbc.dylib | grep -c ' _SQL'

      - name: Package tar.gz
        run: |
          mkdir -p staging/argus-odbc/lib
          mkdir -p staging/argus-odbc/include/argus
          cp build/src/libargus_odbc.dylib staging/argus-odbc/lib/
          cp include/argus/*.h staging/argus-odbc/include/argus/
          cp scripts/install_dsn_macos.sh staging/argus-odbc/
          chmod +x staging/argus-odbc/install_dsn_macos.sh
          tar -czf argus-odbc-macos-$(uname -m).tar.gz -C staging argus-odbc

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-macos
          path: argus-odbc-macos-*.tar.gz

      - name: Package .pkg
        run: bash packaging/build-macos-pkg.sh

      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-pkg
          path: argus-odbc-*.pkg

  build-windows:
    runs-on: windows-latest
    environment: main

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-json-glib
            mingw-w64-ucrt-x86_64-glib-networking
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-thrift
            mingw-w64-ucrt-x86_64-cmocka
            mingw-w64-ucrt-x86_64-nsis

      - name: Cache thrift_c_glib
        id: cache-thrift
        uses: actions/cache@v4
        with:
          path: thrift-c-glib-prefix
          key: thrift-c-glib-0.23.0-ucrt64-v1

      - name: Build thrift_c_glib (portable subset)
        if: steps.cache-thrift.outputs.cache-hit != 'true'
        # MSYS2 ships the thrift compiler but not the c_glib runtime; build
        # the portable subset (Argus talks through its own GIO transport).
        run: bash scripts/build-thrift-c-glib.sh "$PWD/thrift-c-glib-prefix" 0.23.0

      - name: Configure
        run: >-
          PKG_CONFIG_PATH="$PWD/thrift-c-glib-prefix/lib/pkgconfig"
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Unit Tests
        run: cd build && ctest --output-on-failure -L unit

      - name: Prepare installer files
        run: |
          mkdir -p installer/staging/gio-modules
          cp build/src/libargus_odbc.dll installer/staging/argus_odbc.dll
          # GIO TLS backend for the Hive/Impala binary-Thrift transport;
          # loaded at runtime from gio-modules\ next to the driver DLL.
          cp "$MINGW_PREFIX/lib/gio/modules/libgioopenssl.dll" \
              installer/staging/gio-modules/
          # Bundle the transitive DLL closure; fails if anything is missing
          bash scripts/bundle_windows_dlls.sh "$MINGW_PREFIX/bin" \
              installer/staging installer/staging/argus_odbc.dll \
              installer/staging/gio-modules/libgioopenssl.dll
          ls -la installer/staging/

      - name: Sign driver DLL
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: installer/staging
          files-folder-filter: dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build NSIS installer
        run: |
          cd installer/staging
          VERSION=$(grep 'project(argus VERSION' ../../CMakeLists.txt | sed 's/.*VERSION \([^ )]*\).*/\1/')
          makensis -NOCD -DVERSION=$VERSION ../argus-odbc.nsi

      - name: Sign installer
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_SIGNING_PROFILE }}
          files-folder: installer/staging
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: argus-odbc-installer
          path: installer/staging/argus-odbc-installer.exe

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            unixodbc-dev \
            libglib2.0-dev \
            libthrift-c-glib-dev \
            thrift-compiler \
            libcmocka-dev \
            libcurl4-openssl-dev \
            libjson-glib-dev \
            libmariadb-dev

      - name: Generate TLS certificates
        run: bash tests/integration/certs/generate.sh

      - name: Start services
        # Bring up the services with working healthchecks and block until ready
        # (Pinot's healthcheck also waits for its sample-data ingestion).
        # trino-ssl starts in a second wave: booting two Trino JVMs plus the
        # Pinot quickstart at once overcommits the runner.
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d --wait \
            mariadb influxdb3 influxdb3-seed trino pinot bigquery
          docker compose -f tests/integration/docker-compose.yml up -d --wait \
            trino-ssl

      - name: Service diagnostics
        if: failure()
        run: |
          docker ps -a
          docker compose -f tests/integration/docker-compose.yml logs --tail 80 \
            trino-ssl trino pinot mariadb

      - name: Configure
        run: cmake -B build -DBUILD_INTEGRATION_TESTS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Integration Tests
        env:
          TRINO_HOST: localhost
          TRINO_PORT: "8080"
          TRINO_SSL_HOST: localhost
          TRINO_SSL_PORT: "8443"
          TRINO_SSL_CA_FILE: ${{ github.workspace }}/tests/integration/certs/ca-cert.pem
          MYSQL_HOST: "127.0.0.1"
          MYSQL_PORT: "3306"
          PINOT_HOST: "127.0.0.1"
          PINOT_PORT: "8000"
          BQ_ENDPOINT: "http://127.0.0.1:9050"
          BQ_PROJECT: "test"
        # Run the backends whose deps are installed here (Trino, MySQL-wire,
        # Pinot, BigQuery). Flight SQL / ADBC require Arrow and run in their
        # own setup.
        run: cd build && ctest --output-on-failure -L integration -R "trino|mysql|pinot|bigquery"

      - name: Stop services
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            unixodbc-dev \
            libglib2.0-dev \
            libthrift-c-glib-dev \
            thrift-compiler \
            libcmocka-dev \
            libcurl4-openssl-dev \
            libjson-glib-dev \
            libmariadb-dev

      - name: Configure (ASan + UBSan)
        run: cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON

      - name: Build
        run: cmake --build build-asan -j$(nproc)

      - name: Unit tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:abort_on_error=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp
        run: cd build-asan && ctest --output-on-failure -L unit

# Seed data for the BigQuery emulator (goccy/bigquery-emulator).
projects:
- id: test
  datasets:
  - id: testds
    tables:
    - id: samples
      columns:
      - name: id
        type: INTEGER
      - name: name
        type: STRING
      - name: score
        type: FLOAT
      - name: active
        type: BOOLEAN
      data:
      - id: 1
        name: alice
        score: 9.5
        active: true
      - id: 2
        name: bob
        score: 7.25
        active: false
      - id: 3
        name: carol
        score: 8.0
        active: true

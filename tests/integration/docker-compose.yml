version: "3.8"

services:
  hiveserver2:
    image: apache/hive:4.0.0
    container_name: argus-hiveserver2
    ports:
      - "10000:10000"   # HiveServer2 Thrift
      - "10002:10002"   # HiveServer2 Web UI
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >-
        -Dhive.server2.authentication=NOSASL
        -Dhive.server2.thrift.port=10000
    healthcheck:
      test: ["CMD", "beeline", "-u", "jdbc:hive2://localhost:10000", "-e", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  trino:
    image: trinodb/trino:latest
    container_name: argus-trino
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  trino-ssl:
    image: trinodb/trino:latest
    container_name: argus-trino-ssl
    ports:
      - "8443:8443"
    volumes:
      - ./certs/server.p12:/etc/trino/server.p12:ro
      - ./certs/truststore.jks:/etc/trino/truststore.jks:ro
      - ./trino-ssl-config:/etc/trino-ssl-config:ro
    environment:
      # Override Trino config to enable HTTPS on port 8443
      JAVA_TOOL_OPTIONS: >-
        -Dhttp-server.https.enabled=true
        -Dhttp-server.https.port=8443
        -Dhttp-server.https.keystore.path=/etc/trino/server.p12
        -Dhttp-server.https.keystore.key=changeit
        -Dhttp-server.http.enabled=false
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8443/v1/info"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  phoenix:
    image: apache/phoenix:5.2.0
    container_name: argus-phoenix
    ports:
      - "8765:8765"     # Phoenix Query Server
      - "2181:2181"     # ZooKeeper
      - "16010:16010"   # HBase Master UI
    environment:
      START_HBASE: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  kudu-master:
    image: apache/kudu:latest
    container_name: argus-kudu-master
    ports:
      - "7051:7051"     # Kudu Master RPC
      - "8051:8051"     # Kudu Master Web UI
    command: ["master"]
    environment:
      MASTER_ARGS: "--fs_wal_dir=/var/lib/kudu/master --webserver_doc_root=/opt/kudu/www"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051/"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kudu-tserver:
    image: apache/kudu:latest
    container_name: argus-kudu-tserver
    ports:
      - "7050:7050"     # Kudu Tablet Server RPC
      - "8050:8050"     # Kudu Tablet Server Web UI
    command: ["tserver"]
    environment:
      TSERVER_ARGS: "--fs_wal_dir=/var/lib/kudu/tserver --tserver_master_addrs=kudu-master:7051"
    depends_on:
      kudu-master:
        condition: service_healthy

  # ── Spark Thrift Server ────────────────────────────────────────────────
  # Spark's Thrift Server is HiveServer2-compatible; Argus reaches it through
  # the Hive backend. Exposed on host port 10010 to avoid clashing with the
  # Hive container on 10000. NOTE: template — the start command/options may need
  # tuning for the chosen Spark image version.
  spark-thrift:
    image: apache/spark:3.5.3
    container_name: argus-spark-thrift
    ports:
      - "10010:10000"   # Spark Thrift Server (HiveServer2 protocol)
    command: >-
      bash -c "/opt/spark/sbin/start-thriftserver.sh
      --master 'local[2]'
      --hiveconf hive.server2.thrift.port=10000
      --hiveconf hive.server2.authentication=NOSASL
      && tail -F /opt/spark/logs/*.out"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/10000"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Flink SQL Gateway (HiveServer2 endpoint) ───────────────────────────
  # Flink's SQL Gateway can expose a HiveServer2 endpoint (FLIP-223), reached
  # through the Hive backend. Exposed on host port 10011. NOTE: template — a
  # production setup also requires the flink-sql-connector-hive jar on the
  # classpath and gateway endpoint configuration; validate locally.
  flink-sql-gateway:
    image: flink:1.18
    container_name: argus-flink-sql-gateway
    ports:
      - "10011:10000"   # SQL Gateway hiveserver2 endpoint
    command: >-
      bash -c "/opt/flink/bin/sql-gateway.sh start-foreground
      -Dsql-gateway.endpoint.type=hiveserver2
      -Dsql-gateway.endpoint.hiveserver2.thrift.port=10000"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/10000"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── MariaDB (MySQL-wire backend) ───────────────────────────────────────
  # The MySQL-wire backend (Backend=mysql) also serves StarRocks, Doris and
  # ClickHouse, which speak the same protocol. Seeded from ./mysql-init.
  mariadb:
    image: mariadb:11
    container_name: argus-mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root123
      MARIADB_DATABASE: testdb
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  # ── InfluxDB 3 Core (Arrow Flight SQL backend) ─────────────────────────
  # Flight SQL on the HTTP/gRPC port 8181, auth disabled for tests. The
  # one-shot seed container below writes the "cpu" table into db "testdb".
  influxdb3:
    image: quay.io/influxdb/influxdb3-core:latest
    container_name: argus-influxdb3
    ports:
      - "8181:8181"
    command: >-
      serve --node-id node0 --object-store memory
      --without-auth --http-bind 0.0.0.0:8181

  influxdb3-seed:
    image: curlimages/curl:latest
    container_name: argus-influxdb3-seed
    depends_on:
      - influxdb3
    restart: "no"
    command:
      - sh
      - -c
      - |
        for i in $$(seq 1 30); do
          curl -fsS http://influxdb3:8181/health >/dev/null 2>&1 && break
          sleep 2
        done
        curl -sS "http://influxdb3:8181/api/v3/write_lp?db=testdb&precision=nanosecond" \
          --data-binary 'cpu,host=alpha,region=eu usage=0.5,cores=4i,label="prod" 1718000000000000000
        cpu,host=beta,region=us usage=0.7,cores=8i 1718000001000000000
        cpu,host=gamma,region=eu usage=0.9,cores=16i 1718000002000000000'

  # Apache Pinot single-container QuickStart: brings up controller (9000) +
  # broker (8000) and batch-ingests the sample tables (baseballStats, ...).
  # The healthcheck waits until baseballStats is actually queryable.
  pinot:
    image: apachepinot/pinot:latest
    container_name: argus-pinot
    command: ["QuickStart", "-type", "batch"]
    ports:
      - "8000:8000"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -X POST -H 'Content-Type: application/json' -d '{\"sql\":\"SELECT COUNT(*) FROM baseballStats\"}' http://localhost:8000/query/sql 2>/dev/null | grep -q 'rows\":\\[\\[[1-9]'"]
      interval: 10s
      timeout: 8s
      retries: 40
      start_period: 40s

# Trino single-node config with HTTPS enabled (integration TLS tests).
# Internal communication and discovery stay on plain HTTP inside the
# container (port 8080, not published); clients hit HTTPS on 8443.
coordinator=true
node-scheduler.include-coordinator=true
discovery.uri=http://localhost:8080
catalog.management=${ENV:CATALOG_MANAGEMENT}
http-server.http.enabled=true
http-server.http.port=8080
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/server.p12
http-server.https.keystore.key=changeit
